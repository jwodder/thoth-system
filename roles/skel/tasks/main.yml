---
- name: Store jwodder_root var for later roles
  ansible.builtin.set_fact:
    # This makes the variable accessible to subsequent roles, right?
    jwodder_root: "{{ jwodder_root }}"  # noqa: var-naming[no-role-prefix]

- name: Create jwodder package skeleton
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ admin_user }}"
    mode: "0755"
  with_items:
    - "{{ jwodder_root }}/bin"
    - "{{ jwodder_root }}/etc"
    - "{{ jwodder_root }}/share"

- name: Create secrets directory
  ansible.builtin.file:
    path: "{{ jwodder_root }}/etc/secret"
    state: directory
    owner: root
    group: root
    mode: "0700"
