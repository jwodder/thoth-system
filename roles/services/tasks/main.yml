---
- name: Install thoth-utils for admin user
  community.general.pipx:
    name: thoth-utils
    source: git+https://github.com/jwodder/thoth-utils
    state: latest
  become: true
  become_user: "{{ admin_user }}"

- name: Create ~admin/.config/thoth-utils
  ansible.builtin.file:
    path: "{{ admin_user }}/.config/thoth-utils"
    state: directory
    owner: "{{ admin_user }}"
    mode: "0755"

- name: Create thoth-utils config file
  ansible.builtin.template:
    src: config.toml
    dest: "{{ admin_user }}/.config/thoth-utils/config.toml"
    owner: "{{ admin_user }}"
    mode: "0600"

- name: Download & install Dropbox-Uploader
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/andreafabrizi/Dropbox-Uploader/{{ backup_dropbox_uploader_version }}/dropbox_uploader.sh
    dest: /usr/local/bin/dropbox_uploader
    owner: root
    mode: "0755"
    force: true

- name: Install age
  install_age:
    minversion: v1.3.0

- name: Install bin/mkbackup
  ansible.builtin.template:
    src: mkbackup
    dest: /usr/local/bin/mkbackup
    owner: root
    mode: "0755"

- name: Install share/backup.exclude
  ansible.builtin.copy:
    src: backup.exclude
    dest: /usr/local/etc/mkbackup/backup.exclude
    owner: root
    mode: "0644"

- name: Store Dropbox credentials
  ansible.builtin.copy:
    dest: /usr/local/etc/mkbackup/dropbox_uploader
    content: |
      CONFIGFILE_VERSION=2.0
      OAUTH_APP_KEY={{ backup_dropbox_oauth_app_key | quote }}
      OAUTH_APP_SECRET={{ backup_dropbox_oauth_app_secret | quote }}
      OAUTH_REFRESH_TOKEN={{ backup_dropbox_oauth_app_refresh_token | quote }}
    owner: root
    group: root
    mode: "0600"

- name: Store backup recipient pubkey
  ansible.builtin.copy:
    dest: /usr/local/etc/mkbackup/backup-recipient.txt
    content: |
      {{ backup_recipient_pubkey }}
    owner: root
    mode: "0644"

- name: Configure systemd units
  ansible.builtin.template:
    src: "{{ item }}"
    dest: /etc/systemd/system/{{ item }}
    mode: "0644"
  with_items:
    - dailyreport.service
    - dailyreport.timer
    - mkbackup.service
    - mkbackup.timer
    - update-dns.service
    - update-dns.timer
  register: services_units

# This has to run before we can enable the timers, so using a handler isn't an
# option here.
- name: Reload systemd  # noqa: no-handler
  ansible.builtin.systemd:
    daemon_reload: true
  when: services_units is changed

- name: Enable & start systemd timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  with_items:
    - dailyreport.timer
    - mkbackup.timer
    - update-dns.timer
