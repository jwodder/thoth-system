---
- name: Restart authfail.service if running  # noqa: command-instead-of-module
  # Ansible's systemd module doesn't support try-restart ... yet.  See
  # <https://github.com/ansible/ansible/issues/87146>.
  ansible.builtin.command: systemctl try-restart authfail.service
  changed_when: true

- name: Restart rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: restarted
