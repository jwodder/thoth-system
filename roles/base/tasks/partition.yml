---
- name: Partition attached drive
  # Based on my reading of the module source, if the partition already exists
  # and the label & flags have the values given here, then — as long as
  # `resize` is set to `false` — nothing will be altered.
  #
  # However, if a drive gets swapped around and the new sda has one partition
  # but not two, then Bad Things are likely — but what kind, exactly?
  community.general.parted:
    device: /dev/sda
    number: "{{ item.number }}"
    state: present
    resize: false
    flags: []
    label: gpt
    part_start: "{{ item.part_start }}"
    part_end: "{{ item.part_end }}"
    fs_type: ext4
  loop:
    - {number: 1, part_start: 0%, part_end: 50%}
    - {number: 2, part_start: 50%, part_end: 100%}

- name: Format attached drive partitions
  community.general.filesystem:
    dev: "/dev/{{ item }}"
    fstype: ext4
  with_items:
    - sda1
    - sda2
  register: base_format

- name: Re-collect facts to get new device UUIDs  # noqa: no-handler
  ansible.builtin.setup:
    gather_subset: "!all,!min,devices"
  when: base_format is changed

- name: Create /srv/git
  ansible.builtin.file:
    path: /srv/git
    state: directory
    owner: git
    mode: "0755"

- name: Mount sda1 at /srv/git
  ansible.posix.mount:
    src: "UUID={{ ansible_facts['devices']['sda']['partitions']['sda1']['uuid'] }}"
    path: /srv/git
    fstype: ext4
    opts: defaults,nofail
    dump: '0'
    passno: '0'
    state: mounted

- name: Create /mnt/scratch
  ansible.builtin.file:
    path: /mnt/scratch
    state: directory
    mode: "0755"

- name: Mount sda2 at /mnt/scratch
  ansible.posix.mount:
    src: "UUID={{ ansible_facts['devices']['sda']['partitions']['sda2']['uuid'] }}"
    path: /mnt/scratch
    fstype: ext4
    opts: defaults,nofail
    dump: '0'
    passno: '0'
    state: mounted

- name: Grant git user ownership of everything in /srv/git
  ansible.builtin.file:
    path: /srv/git
    state: directory
    follow: false
    recurse: true
    owner: git
    mode: u+rwX
